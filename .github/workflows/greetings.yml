name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to **Mikav**! Thanks for opening your first issue.

            A maintainer will take a look shortly. In the meantime, please make sure you've provided enough context — steps to reproduce, expected behavior, and environment details really help.

            *നന്ദി!* 🙏
          pr-message: |
            🎉 Thanks for your first pull request to **Mikav**!

            A maintainer will review it soon. Please make sure:
            - The build passes (`npm run build`)
            - Lint is clean (`npm run lint`)
            - Your PR description explains the changes

            We appreciate your contribution to Kerala's open AI ecosystem! *നന്ദി!* 🙏
