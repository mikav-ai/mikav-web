name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: |
            This issue has been inactive for 30 days. It will be closed in 7 days if there's no further activity. Feel free to reopen or comment if this is still relevant.
          stale-pr-message: |
            This pull request has been inactive for 30 days. It will be closed in 7 days if there's no further activity. Please rebase and update if you'd like to continue working on it.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,roadmap
          exempt-pr-labels: work-in-progress
