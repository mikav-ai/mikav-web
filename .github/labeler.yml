# Label configuration for actions/labeler
# See: https://github.com/actions/labeler

app:
  - changed-files:
      - any-glob-to-any-file: 'app/**'

components:
  - changed-files:
      - any-glob-to-any-file: 'components/**'

ui:
  - changed-files:
      - any-glob-to-any-file: 'components/ui/**'

styles:
  - changed-files:
      - any-glob-to-any-file: '**/*.css'

config:
  - changed-files:
      - any-glob-to-any-file:
          - '*.config.*'
          - 'tsconfig.json'
          - 'package.json'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - '*.md'
          - 'docs/**'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'
